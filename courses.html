<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Courses — Edume Learning</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
  .page-hero { background:linear-gradient(135deg,#F0FBF6 0%,#FFF9F0 100%); padding:3rem 2rem 2rem; border-bottom:1px solid var(--border); }
  .page-hero-inner { max-width:1100px; margin:0 auto; }
  .page-hero h1 { font-family:'Playfair Display',serif; font-size:2.2rem; font-weight:700; margin-bottom:0.4rem; }
  .search-bar { display:flex; gap:0.75rem; margin-top:1.25rem; max-width:600px; }
  .search-wrap { flex:1; position:relative; }
  .search-wrap input { width:100%; padding:0.75rem 1rem 0.75rem 2.75rem; border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans'; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
  .search-wrap input:focus { border-color:var(--teal); }
  .search-icon { position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); font-size:1rem; pointer-events:none; }
  .filters-bar { max-width:1100px; margin:0 auto; padding:1rem 2rem; display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap; border-bottom:1px solid var(--border); background:white; }
  .chip { padding:0.38rem 0.9rem; border-radius:20px; border:1.5px solid var(--border); background:white; font-family:'DM Sans'; font-size:0.78rem; font-weight:500; cursor:pointer; transition:all 0.18s; color:var(--ink-muted); }
  .chip.active { border-color:var(--teal); background:var(--teal); color:white; }
  .chip:hover:not(.active) { border-color:var(--teal); color:var(--teal); }
  .filter-selects { display:flex; gap:0.5rem; margin-left:auto; flex-wrap:wrap; }
  .fsel { padding:0.38rem 0.7rem; border-radius:8px; border:1.5px solid var(--border); font-family:'DM Sans'; font-size:0.78rem; cursor:pointer; background:white; color:var(--ink-muted); }
  .catalog { max-width:1100px; margin:0 auto; padding:1.5rem 2rem; }
  .results-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; }
  .results-count { font-size:0.83rem; color:var(--ink-faint); }
  .courses-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(272px,1fr)); gap:1.25rem; }
  .cc { background:white; border-radius:14px; border:1px solid var(--border); overflow:hidden; text-decoration:none; display:block; transition:all 0.2s; }
  .cc:hover { transform:translateY(-3px); box-shadow:0 10px 28px rgba(0,0,0,0.08); border-color:var(--teal-light); }
  .cc-thumb { height:150px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; position:relative; overflow:hidden; }
  .cc-thumb img { width:100%; height:100%; object-fit:cover; }
  .cc-lang { position:absolute; top:10px; right:10px; font-size:0.67rem; font-weight:700; background:rgba(0,0,0,0.45); color:white; padding:3px 8px; border-radius:5px; }
  .cc-hot { position:absolute; top:10px; left:10px; font-size:0.67rem; font-weight:700; background:var(--amber); color:var(--ink); padding:3px 8px; border-radius:5px; }
  .cc-body { padding:1rem; }
  .cc-cat { font-size:0.68rem; font-weight:700; color:var(--teal); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.3rem; }
  .cc-title { font-size:0.88rem; font-weight:600; color:var(--ink); line-height:1.4; margin-bottom:0.35rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .cc-by { font-size:0.73rem; color:var(--ink-faint); margin-bottom:0.4rem; }
  .cc-rating { display:flex; align-items:center; gap:4px; font-size:0.76rem; margin-bottom:0.5rem; }
  .cc-stars { color:#EF9F27; }
  .cc-footer { display:flex; align-items:center; justify-content:space-between; padding-top:0.5rem; border-top:1px solid var(--border); }
  .cc-price { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:var(--teal); }
  .cc-price .op { font-size:0.72rem; font-family:'DM Sans'; color:var(--ink-faint); text-decoration:line-through; font-weight:400; margin-right:3px; }
  .load-more-row { display:flex; justify-content:center; margin-top:2rem; }
  .empty { grid-column:1/-1; text-align:center; padding:4rem; color:var(--ink-faint); }
  .empty .e-icon { font-size:3rem; margin-bottom:0.75rem; }
</style>
</head>
<body>
<nav class="app-nav" id="app-nav"></nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1>Browse Courses</h1>
    <p style="color:var(--ink-muted)">Expert-taught courses in Sinhala, Tamil & English.</p>
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="q" placeholder="Search courses, instructors, topics…" oninput="debounce()">
      </div>
      <button class="btn btn-primary" onclick="load()">Search</button>
    </div>
  </div>
</div>

<div class="filters-bar">
  <button class="chip active" onclick="setCat(this,'')">All</button>
  <button class="chip" onclick="setCat(this,'IT & Programming')">💻 IT</button>
  <button class="chip" onclick="setCat(this,'Mathematics')">📐 Maths</button>
  <button class="chip" onclick="setCat(this,'Science')">🧪 Science</button>
  <button class="chip" onclick="setCat(this,'Business & Finance')">💼 Business</button>
  <button class="chip" onclick="setCat(this,'Languages')">🌐 Languages</button>
  <button class="chip" onclick="setCat(this,'Design & Creative')">🎨 Design</button>
  <button class="chip" onclick="setCat(this,'Digital Marketing')">📈 Marketing</button>
  <div class="filter-selects">
    <select class="fsel" id="fl" onchange="load()">
      <option value="">Any Language</option>
      <option value="si">සිංහල</option>
      <option value="ta">தமிழ்</option>
      <option value="en">English</option>
    </select>
    <select class="fsel" id="fs" onchange="load()">
      <option value="newest">Newest</option>
      <option value="price_asc">Price ↑</option>
      <option value="price_desc">Price ↓</option>
    </select>
    <select class="fsel" id="fp" onchange="load()">
      <option value="">Any Price</option>
      <option value="free">Free</option>
      <option value="0-2000">Under LKR 2,000</option>
      <option value="2000-5000">LKR 2,000–5,000</option>
      <option value="5000-99999">Over LKR 5,000</option>
    </select>
  </div>
</div>

<div class="catalog">
  <div class="results-bar">
    <span class="results-count" id="rc">Loading…</span>
  </div>
  <div class="courses-grid" id="grid"><div class="spinner" style="grid-column:1/-1"></div></div>
  <div class="load-more-row" id="lmr" style="display:none">
    <button class="btn btn-secondary btn-lg" onclick="loadMore()">Load More</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/ui.js"></script>
<script>
const SZ = 12;
let page = 0, cat = '', total = 0, loaded = [], timer;
const COLORS = {'IT & Programming':'#E1F5EE','Mathematics':'#FAEEDA','Science':'#FAECE7','Business & Finance':'#E6F1FB','Languages':'#EEEDFE','Design & Creative':'#FBEAF0','Digital Marketing':'#EAF3DE'};
const LANGS  = { si:'සිංහල', ta:'தமிழ்', en:'English' };

async function load(append=false) {
  if (!append) { page=0; loaded=[]; document.getElementById('grid').innerHTML='<div class="spinner" style="grid-column:1/-1"></div>'; document.getElementById('lmr').style.display='none'; }
  const q=document.getElementById('q').value.trim(), lang=document.getElementById('fl').value, sort=document.getElementById('fs').value, pr=document.getElementById('fp').value;
  let qb = edumeDB.sb.from('courses').select('id,title,category,language,price,thumbnail_emoji,thumbnail_url,instructor_name,created_at',{count:'exact'}).eq('is_published',true).range(page*SZ,(page+1)*SZ-1);
  if (cat)  qb=qb.eq('category',cat);
  if (lang) qb=qb.eq('language',lang);
  if (q)    qb=qb.ilike('title',`%${q}%`);
  if (pr==='free') qb=qb.eq('price',0);
  else if (pr) { const [a,b]=pr.split('-').map(Number); qb=qb.gte('price',a).lte('price',b); }
  if (sort==='price_asc')  qb=qb.order('price',{ascending:true});
  else if (sort==='price_desc') qb=qb.order('price',{ascending:false});
  else qb=qb.order('created_at',{ascending:false});
  const {data,count} = await qb;
  total=count||0; loaded=append?[...loaded,...(data||[])]:(data||[]);
  render(); page++;
}

function render() {
  const grid=document.getElementById('grid');
  document.getElementById('rc').textContent=`${total} course${total!==1?'s':''} found`;
  if (!loaded.length) { grid.innerHTML='<div class="empty"><div class="e-icon">🔍</div><h3 style="font-weight:600;color:var(--ink-muted)">No courses found</h3><p>Try different keywords or filters.</p></div>'; return; }
  const html=loaded.map(c=>`
    <a href="/course.html?id=${c.id}" class="cc">
      <div class="cc-thumb" style="background:${COLORS[c.category]||'#F0FBF6'}">
        ${c.thumbnail_url?`<img src="${c.thumbnail_url}" alt="${c.title}">`:(c.thumbnail_emoji||'📚')}
        <span class="cc-lang">${LANGS[c.language]||c.language}</span>
      </div>
      <div class="cc-body">
        <div class="cc-cat">${c.category||'Course'}</div>
        <div class="cc-title">${c.title}</div>
        <div class="cc-by">by ${c.instructor_name||'Edume Instructor'}</div>
        <div class="cc-rating"><span class="cc-stars">★★★★★</span><span style="font-weight:600;color:var(--ink)">4.8</span><span style="color:var(--ink-faint)">(0)</span></div>
        <div class="cc-footer">
          <div class="cc-price">${c.price>0?formatLKR(c.price):'<span style="color:var(--teal)">Free</span>'}</div>
          <span style="font-size:0.72rem;color:var(--ink-faint)">🎓 Certificate</span>
        </div>
      </div>
    </a>`).join('');
  grid.innerHTML=html;
  document.getElementById('lmr').style.display = loaded.length < total ? 'flex':'none';
}

function loadMore() { load(true); }
function setCat(el,c) { cat=c; document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active')); el.classList.add('active'); load(); }
function debounce() { clearTimeout(timer); timer=setTimeout(load,400); }

const urlQ=new URLSearchParams(location.search).get('q');
if (urlQ) document.getElementById('q').value=urlQ;
renderNav();
load();
</script>
</body>
</html>
