<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate of Completion — Edume Learning</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ui.js"></script>
  <style>
    body { background: #1A1A17; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 2rem 1rem; }

    .cert-topbar {
      width: 100%; max-width: 900px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .cert-topbar-logo { font-family: 'Playfair Display'; color: white; font-size: 1.2rem; text-decoration: none; }
    .cert-actions { display: flex; gap: 0.75rem; }

    /* Canvas wrapper */
    .cert-canvas-wrap {
      background: white; border-radius: 8px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      overflow: hidden; position: relative;
      width: 100%; max-width: 900px;
    }
    #certCanvas { display: block; width: 100%; height: auto; }

    /* Verify badge */
    .verify-strip {
      background: white; width: 100%; max-width: 900px;
      border-radius: 12px; padding: 1rem 1.5rem;
      margin-top: 1rem; display: flex; align-items: center; gap: 1rem;
    }
    .verify-icon { width: 40px; height: 40px; background: #DCFCE7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .verify-text h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; }
    .verify-text p { font-size: 0.78rem; color: var(--ink-faint); }
    .verify-id { margin-left: auto; font-family: monospace; font-size: 0.78rem; color: var(--ink-faint); }

    /* Loading / error states */
    .cert-placeholder {
      width: 100%; max-width: 900px; aspect-ratio: 1.414/1;
      background: #2A2A27; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.4);
    }
    .cert-placeholder svg { width: 64px; height: 64px; margin-bottom: 1rem; opacity: 0.3; }

    .share-row { width: 100%; max-width: 900px; display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .share-btn {
      padding: 0.45rem 1rem; border-radius: 8px; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7); font-family: 'DM Sans'; transition: all 0.15s;
    }
    .share-btn:hover { background: rgba(255,255,255,0.15); color: white; }
  </style>
</head>
<body>

<div class="cert-topbar">
  <a class="cert-topbar-logo" href="index.html">Edume Learning</a>
  <div class="cert-actions">
    <button class="btn btn-secondary" id="btnDownloadPNG" onclick="downloadPNG()" style="display:none;">⬇ Download PNG</button>
    <button class="btn btn-amber" id="btnDownloadPDF" onclick="downloadPDF()" style="display:none;">⬇ Download PDF</button>
  </div>
</div>

<!-- Loading state -->
<div class="cert-placeholder" id="certPlaceholder">
  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
  <p>Loading certificate…</p>
</div>

<!-- Canvas -->
<div class="cert-canvas-wrap" id="certWrap" style="display:none;">
  <canvas id="certCanvas"></canvas>
</div>

<!-- Verify strip -->
<div class="verify-strip" id="verifyStrip" style="display:none;">
  <div class="verify-icon">✓</div>
  <div class="verify-text">
    <h4>Verified Certificate</h4>
    <p>This certificate was issued by Edume Learning and is cryptographically verified.</p>
  </div>
  <div class="verify-id" id="verifyCertId">—</div>
</div>

<!-- Share -->
<div class="share-row" id="shareRow" style="display:none;">
  <button class="share-btn" onclick="shareLinkedIn()">🔗 Share on LinkedIn</button>
  <button class="share-btn" onclick="copyLink()">📋 Copy Certificate Link</button>
  <a class="share-btn" href="student-dashboard.html">← Back to My Certificates</a>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════
//  CERTIFICATE RENDERER — Edume Learning
//  Uses HTML Canvas to draw a beautiful certificate
//  then exports as PNG or PDF via jsPDF
// ════════════════════════════════════════════════

const params = new URLSearchParams(location.search);
const CERT_ID = params.get('id');

let certData = null;

// ── Load ──
(async () => {
  if (!CERT_ID) { showError('No certificate ID provided.'); return; }

  const { data: cert, error } = await sb.from('certificates')
    .select('*, profiles(full_name, email, avatar_url), courses(title, instructor_name, thumbnail_url, profiles(full_name))')
    .eq('id', CERT_ID)
    .single();

  if (error || !cert) { showError('Certificate not found or has been revoked.'); return; }

  certData = cert;
  document.title = `Certificate — ${cert.profiles?.full_name || 'Student'} — Edume Learning`;

  // Show
  document.getElementById('certPlaceholder').style.display = 'none';
  document.getElementById('certWrap').style.display = 'block';
  document.getElementById('verifyStrip').style.display = 'flex';
  document.getElementById('shareRow').style.display = 'flex';
  document.getElementById('btnDownloadPNG').style.display = 'inline-flex';
  document.getElementById('btnDownloadPDF').style.display = 'inline-flex';
  document.getElementById('verifyCertId').textContent = 'ID: ' + CERT_ID;

  await renderCertificate(cert);
})();

// ── Render on Canvas ──
async function renderCertificate(cert) {
  const canvas = document.getElementById('certCanvas');
  // A4 landscape at 150dpi
  const W = 1123, H = 794;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ─ Background ─
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#FAFAF7');
  bgGrad.addColorStop(1, '#F0F7F4');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

  // ─ Border frame ─
  const borderInset = 24;
  ctx.strokeStyle = '#0F6E56'; ctx.lineWidth = 3;
  roundRect(ctx, borderInset, borderInset, W - borderInset*2, H - borderInset*2, 16);
  ctx.stroke();

  // Inner thin border
  ctx.strokeStyle = 'rgba(15,110,86,0.3)'; ctx.lineWidth = 1;
  roundRect(ctx, borderInset + 10, borderInset + 10, W - (borderInset+10)*2, H - (borderInset+10)*2, 12);
  ctx.stroke();

  // ─ Top decorative band ─
  const bandGrad = ctx.createLinearGradient(0, 0, W, 0);
  bandGrad.addColorStop(0, '#085041');
  bandGrad.addColorStop(0.5, '#0F6E56');
  bandGrad.addColorStop(1, '#085041');
  ctx.fillStyle = bandGrad;
  roundRectTop(ctx, borderInset + 2, borderInset + 2, W - (borderInset+2)*2, 90, 14);
  ctx.fill();

  // ─ Logo / Platform name ─
  ctx.fillStyle = 'white';
  ctx.font = 'bold 28px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('EDUME LEARNING', W/2, borderInset + 52);

  // Small tagline in band
  ctx.font = '13px DM Sans, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillText('Online Education Platform · Sri Lanka', W/2, borderInset + 72);

  // ─ Corner ornaments ─
  drawCornerOrnament(ctx, borderInset + 2, borderInset + 2, 0);
  drawCornerOrnament(ctx, W - borderInset - 2, borderInset + 2, 90);
  drawCornerOrnament(ctx, W - borderInset - 2, H - borderInset - 2, 180);
  drawCornerOrnament(ctx, borderInset + 2, H - borderInset - 2, 270);

  // ─ Medal icon ─
  drawMedal(ctx, W/2, borderInset + 90 + 60);

  // ─ "CERTIFICATE OF COMPLETION" ─
  ctx.fillStyle = '#085041';
  ctx.font = 'bold 13px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '4px';
  ctx.fillText('CERTIFICATE OF COMPLETION', W/2, borderInset + 90 + 135);

  // ─ "This is to certify that" ─
  ctx.fillStyle = '#4A4A45';
  ctx.font = 'italic 18px Georgia, serif';
  ctx.fillText('This is to certify that', W/2, borderInset + 90 + 165);

  // ─ Student name ─
  const studentName = cert.profiles?.full_name || cert.profiles?.email || 'Student';
  ctx.fillStyle = '#085041';
  ctx.font = 'bold 44px Georgia, serif';
  ctx.fillText(studentName, W/2, borderInset + 90 + 215);

  // Underline
  const nameWidth = ctx.measureText(studentName).width;
  ctx.strokeStyle = '#EF9F27'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W/2 - nameWidth/2, borderInset + 90 + 222);
  ctx.lineTo(W/2 + nameWidth/2, borderInset + 90 + 222);
  ctx.stroke();

  // ─ "has successfully completed" ─
  ctx.fillStyle = '#4A4A45';
  ctx.font = 'italic 18px Georgia, serif';
  ctx.fillText('has successfully completed the course', W/2, borderInset + 90 + 252);

  // ─ Course title ─
  const courseTitle = cert.courses?.title || 'Course';
  ctx.fillStyle = '#1A1A17';
  ctx.font = 'bold 26px Georgia, serif';
  wrapText(ctx, courseTitle, W/2, borderInset + 90 + 290, W - 200, 34);

  // ─ Divider ─
  const divY = H - 160;
  ctx.strokeStyle = 'rgba(15,110,86,0.2)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(borderInset + 80, divY); ctx.lineTo(W - borderInset - 80, divY); ctx.stroke();

  // ─ Bottom: date | cert id | instructor ─
  const bottomY = divY + 40;
  const issuedDate = new Date(cert.issued_at || Date.now()).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
  const instructorName = cert.courses?.profiles?.full_name || 'Edume Instructor';

  // Left: Issue date
  ctx.textAlign = 'left';
  ctx.fillStyle = '#888780'; ctx.font = '11px DM Sans, sans-serif';
  ctx.fillText('DATE OF ISSUE', borderInset + 80, bottomY);
  ctx.fillStyle = '#1A1A17'; ctx.font = 'bold 15px Georgia, serif';
  ctx.fillText(issuedDate, borderInset + 80, bottomY + 22);

  // Center: Seal
  drawSeal(ctx, W/2, bottomY + 10);

  // Right: Instructor
  ctx.textAlign = 'right';
  ctx.fillStyle = '#888780'; ctx.font = '11px DM Sans, sans-serif';
  ctx.fillText('INSTRUCTOR', W - borderInset - 80, bottomY);
  ctx.fillStyle = '#1A1A17'; ctx.font = 'bold 15px Georgia, serif';
  ctx.fillText(instructorName, W - borderInset - 80, bottomY + 22);

  // ─ Certificate ID ─
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(136,135,128,0.6)'; ctx.font = '10px monospace';
  ctx.fillText('Certificate ID: ' + CERT_ID, W/2, H - borderInset - 18);
}

// ─ Drawing helpers ─
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function roundRectTop(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawCornerOrnament(ctx, x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle * Math.PI / 180);
  ctx.strokeStyle = '#0F6E56'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(40, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 40); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI/2); ctx.stroke();
  ctx.restore();
}

function drawMedal(ctx, cx, cy) {
  // Ribbon
  ctx.fillStyle = '#EF9F27';
  ctx.beginPath(); ctx.moveTo(cx - 12, cy - 30); ctx.lineTo(cx - 6, cy + 8); ctx.lineTo(cx, cy - 6); ctx.lineTo(cx + 6, cy + 8); ctx.lineTo(cx + 12, cy - 30); ctx.closePath(); ctx.fill();

  // Circle
  const circGrad = ctx.createRadialGradient(cx - 4, cy + 8, 2, cx, cy + 12, 28);
  circGrad.addColorStop(0, '#EF9F27');
  circGrad.addColorStop(1, '#BA7517');
  ctx.fillStyle = circGrad;
  ctx.beginPath(); ctx.arc(cx, cy + 12, 26, 0, Math.PI * 2); ctx.fill();

  // Star
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  drawStar(ctx, cx, cy + 12, 5, 14, 6);
}

function drawStar(ctx, cx, cy, points, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i * Math.PI) / points - Math.PI / 2;
    i === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a)) : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

function drawSeal(ctx, cx, cy) {
  // Outer ring
  ctx.strokeStyle = '#085041'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, 34, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(15,110,86,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, 28, 0, Math.PI * 2); ctx.stroke();

  // Check mark
  ctx.strokeStyle = '#085041'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(cx - 12, cy + 2); ctx.lineTo(cx - 4, cy + 10); ctx.lineTo(cx + 12, cy - 8); ctx.stroke();

  // "VERIFIED" text around
  ctx.fillStyle = '#085041'; ctx.font = 'bold 8px DM Sans, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('VERIFIED', cx, cy + 26);
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    const test = line + words[n] + ' ';
    if (ctx.measureText(test).width > maxW && n > 0) {
      ctx.fillText(line, x, y); line = words[n] + ' '; y += lineH;
    } else { line = test; }
  }
  ctx.fillText(line, x, y);
}

// ── Export ──
function downloadPNG() {
  const canvas = document.getElementById('certCanvas');
  const link = document.createElement('a');
  link.download = 'Edume-Certificate-' + (CERT_ID || 'cert').substring(0, 8) + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Certificate downloaded!', 'success');
}

function downloadPDF() {
  const canvas = document.getElementById('certCanvas');
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  // A4 landscape
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width / 1.5, canvas.height / 1.5] });
  pdf.addImage(imgData, 'PNG', 0, 0, canvas.width / 1.5, canvas.height / 1.5);
  pdf.save('Edume-Certificate-' + (CERT_ID || 'cert').substring(0, 8) + '.pdf');
  showToast('PDF downloaded!', 'success');
}

// ── Share ──
function shareLinkedIn() {
  const url = encodeURIComponent(location.href);
  const title = encodeURIComponent(`I completed a course on Edume Learning!`);
  window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}&title=${title}`, '_blank');
}

function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => showToast('Link copied!', 'success'));
}

// ── Error state ──
function showError(msg) {
  document.getElementById('certPlaceholder').innerHTML = `
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    <p style="margin-bottom:0.5rem;">${msg}</p>
    <a href="student-dashboard.html" style="color:var(--amber);font-size:0.85rem;">Back to Dashboard</a>
  `;
}
</script>
</body>
</html>
